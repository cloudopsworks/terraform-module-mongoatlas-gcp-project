# Module-specific configuration for terraform-module-mongoatlas-gcp-project
# -----------------------------------------------------------------------
# This file is loaded by terragrunt.hcl as `local.local_vars`.
# Only include variables defined in variables-atlas.tf.
# DO NOT include: is_hub, spoke_def, org, extra_tags — those are supplied
# by the Terragrunt hierarchy automatically.
# -----------------------------------------------------------------------

# (Optional) Prefix prepended to the auto-generated project name when `name` is not set.
# The resolved project name becomes "{name_prefix}-{org_unit}-{env_name}-{env_type}-{region}".
# Default: ""
name_prefix: ""

# (Optional) Explicit name for the MongoDB Atlas project.
# When set, overrides both `name_prefix` and the auto-generated name.
# Default: "" (auto-generated from org context)
name: ""

# (Optional) Name of the MongoDB Atlas organization used to look up the org ID.
# Used when `organization_id` is not provided.
# Default: ""
organization_name: ""

# (Optional) Direct MongoDB Atlas organization ID (24-hex-char string, e.g. "64b1a2c3d4e5f60012345678").
# Takes precedence over `organization_name` lookup when both are set.
# Default: ""
organization_id: ""

# (Optional) Generate OpenTofu import blocks for existing Atlas resources.
# Set to true for brown-field adoption of pre-existing Atlas projects.
# Default: false
generate_import: false

# (Optional) Module settings controlling Atlas project features and GCP KMS encryption at rest.
# All keys are optional unless noted; omitted keys use Atlas/provider defaults.
settings:
  # (Optional) Enable default Atlas alert policies for the project. Default: true.
  default_alerts_settings: true

  # (Optional) Collect database-specific statistics (e.g. collection-level stats). Default: true.
  collect_database_specifics_statistics_enabled: true

  # (Optional) Enable the Atlas Data Explorer UI for this project. Default: true.
  data_explorer_enabled: true

  # (Optional) Allow cluster storage sizes beyond standard Atlas maximums. Default: false.
  extended_storage_sizes_enabled: false

  # (Optional) Enable the Atlas Performance Advisor for query optimization suggestions. Default: true.
  performance_advisor_enabled: true

  # (Optional) Enable the Atlas Schema Advisor for schema improvement suggestions. Default: true.
  schema_advisor_enabled: true

  # (Optional) Backup compliance policy for the project.
  # See https://registry.terraform.io/providers/mongodb/mongodbatlas/latest/docs/resources/backup_compliance_policy
  # backup_compliance:
  #   authorized_email: ""              # (Required) Email of the authorized user approving compliance changes.
  #   authorized_user_first_name: ""    # (Required) First name of the authorized user.
  #   authorized_user_last_name: ""     # (Required) Last name of the authorized user.
  #   copy_protection_enabled: false    # (Optional) Prevent snapshot deletion. Default: false.
  #   encryption_at_rest_enabled: false # (Optional) Require encryption at rest for all clusters. Default: false.
  #   pit_enabled: false                # (Optional) Enable point-in-time restores. Default: false.
  #   restore_window_days: 7            # (Optional) Number of days for point-in-time restore window. Default: 7.

  # (Optional) Maintenance window configuration.
  # See https://registry.terraform.io/providers/mongodb/mongodbatlas/latest/docs/resources/maintenance_window
  # maintenance:
  #   day_of_week: 7   # (Optional) Day of week for maintenance (1=Monday … 7=Sunday). Default: 7 (Sunday).
  #   hour_of_day: 3   # (Optional) Hour of day UTC for maintenance start (0-23). Default: 3.

  # (Optional) IP access list entries for the Atlas project.
  # See https://registry.terraform.io/providers/mongodb/mongodbatlas/latest/docs/resources/project_ip_access_list
  # access_list:
  #   - cidr_block: "10.0.0.0/8"    # (Optional) CIDR block to allow. Mutually exclusive with ip_address.
  #     ip_address: ""               # (Optional) Single IP address to allow. Mutually exclusive with cidr_block.
  #     comment: ""                  # (Optional) Human-readable description for this entry.

  # (Optional) Custom Atlas alert configurations.
  # See https://registry.terraform.io/providers/mongodb/mongodbatlas/latest/docs/resources/alert_configuration
  # alerts: []

  # (Optional) GCP Cloud KMS encryption at rest configuration.
  # When enabled, a GCP KMS key ring and crypto key are created and linked to the Atlas project.
  # Note: The Atlas-generated GCP service account is automatically granted
  #       roles/cloudkms.cryptoKeyEncrypterDecrypter on the created key.
  encryption_at_rest:
    # (Optional) Enable GCP KMS encryption at rest for this Atlas project. Default: false.
    enabled: false

    # (Optional) GCP KMS key ring name.
    # Default: "mongodbatlas-{org_unit}-{env_name}-{env_type}-{spoke}-{region_abbr}-keyring"
    key_ring_name: ""

    # (Optional) GCP KMS crypto key name.
    # Default: "mongodbatlas-{org_unit}-{env_name}-{env_type}-{spoke}-{region_abbr}-key"
    crypto_key_name: ""

    # (Optional) GCP region where the KMS key ring is created.
    # Input format: GCP region string (e.g. "us-central1").
    # Default: GCP provider region.
    kms_location: ""

    # (Optional) KMS crypto key automatic rotation period in seconds (format: "{seconds}s").
    # Valid range: 86400s (1 day) to 31536000s (1 year).
    # Default: "7776000s" (90 days).
    rotation_period: "7776000s"
